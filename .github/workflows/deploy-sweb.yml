name: Deploy to sweb.ru

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npx vite build --base=/ --outDir=dist-sweb

      - name: Deploy to sweb.ru via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SWEB_FTP_SERVER }}
          username: ${{ secrets.SWEB_FTP_USERNAME }}
          password: ${{ secrets.SWEB_FTP_PASSWORD }}
          local-dir: ./dist-sweb/
          server-dir: ./public_html/
